<!doctype html>
<html lang="hu">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Statisztika</title>

<style>

}

.container{
  text-align:center;
  width:90%;

}

h1{

}

.btn{

  font-size:18px;

  border-radius:12px;
  cursor:pointer;
}

.telapo{
  background:#2b7cff;
  color:#fff;
}

.szuletes{

  color:#fff;
}

.jezus{

</head>

<body>

<div class="container">

    ✝️ Jézusos statisztika
  </button>

</div>

<script>
function openTelapo(){
  window.open("https://trknorbert76-eng.github.io/raketastelapo1/stats.html", "_blank");

function openSzuletes(){
